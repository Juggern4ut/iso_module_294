<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    <div class="mt-5 mb-5 text-center">
        <h1>Notizenverwaltung</h1>
        <h2>Modul 294</h2>
    </div>
    <form class="card p-4 note-form container">
        <div>
            <label class="form-label">Title</label>
            <input type="text" class="form-control" id="title" name="title" />
        </div>
        <div>
            <label class="form-label">Inhalt</label>
            <input type="text" class="form-control" id="content" name="content" />
        </div>
        <div>
            <input type="submit" class="mt-3 btn btn-primary" value="Erstellen" </input>
        </div>
    </form>

    <section class="mt-5 mb-5 card p-4 pb-0 container">
        <p>Filter</p>
        <input type="text" id="search" class="form-control mb-2" placeholder="Suchbegriff" />

        <select class="form-select" id="sort">
            <option value="date-asc">Datum aufsteigend</option>
            <option value="date-desc">Datum absteigend</option>
            <option value="alpha">Alphabetisch</option>
        </select>

        <p class="mt-4">Notizen</p>
        <section class="notes">
        </section>
    </section>

    <script src="js/main.js"></script>
</body>

</html>
