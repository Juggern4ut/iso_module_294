<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    <div class="mt-5 mb-5 text-center">
        <h1>Notizenverwaltung</h1>
        <h2>Modul 294</h2>
    </div>

    <form class="container card p-4 mb-4" id="login">
        <div>
            <label class="form-label">Benutzername</label>
            <input type="text" class="form-control" id="username" name="title" />
        </div>
        <div>
            <label class="form-label">Passwort</label>
            <input type="password" class="form-control" id="password" name="content" />
        </div>
        <div>
            <input type="submit" class="mt-3 btn btn-primary" value="Login" </input>
        </div>
    </form>
    <main id="page-content" class="hidden">

        <div class="container mb-4 text-end">
            <button id="logout" class="mt-3 btn btn-danger">Logout</button>
        </div>

        <form class="card p-4 note-form container">
            <h3>Erstellen</h3>
            <div>
                <label class="form-label">Title</label>
                <input type="text" class="form-control" id="title" name="title" />
            </div>
            <div>
                <label class="form-label">Inhalt</label>
                <textarea class="form-control" id="content" name="content" placeholder=""
                    id="floatingTextarea"></textarea>
            </div>
            <div>
                <input type="submit" class="mt-3 btn btn-primary" value="Erstellen" </input>
            </div>
        </form>

        <section class="mt-5 mb-5 card p-4 pb-0 container">
            <p>Filter</p>
            <input type="text" id="search" class="form-control mb-2" placeholder="Suchbegriff" />

            <select class="form-select" id="sort">
                <option value="date-asc">Datum aufsteigend</option>
                <option value="date-desc">Datum absteigend</option>
                <option value="alpha">Alphabetisch</option>
            </select>

            <p class="mt-4">Notizen</p>
            <section class="notes">
            </section>
        </section>
    </main>

    <script src="js/main.js"></script>
</body>

</html>
